spring:
  application:
    name: camel-gateway
  datasource:
    url: ${GATEWAY_DB_URL:jdbc:postgresql://192.168.0.13:5432/camel_gateway_ops}
    username: ${GATEWAY_DB_USERNAME:desigual}
    password: ${GATEWAY_DB_PASSWORD:desigual}
    driver-class-name: org.postgresql.Driver

server:
  port: 8081

gateway:
  proxy:
    host: 0.0.0.0
    port: 8082
  environment: local
  rate-limit:
    enabled: true
    requests: 60
    window-seconds: 60
  authorization:
    enabled: true
  metrics:
    enabled: true
  audit:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

camel:
  main:
    name: camel-gateway
    run-controller: true
  metrics:
    enable-route-policy: true
    enable-route-event-notifier: true
    enable-exchange-event-notifier: true
    enable-message-history: false
    route-policy-level: route
    uri-tag-enabled: true
    uri-tag-dynamic: false
